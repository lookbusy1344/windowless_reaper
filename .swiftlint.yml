disabled_rules:
  - trailing_comma
  - identifier_name
  - line_length

opt_in_rules:
  - explicit_init
  - empty_count
  - first_where
  - sorted_first_last
  - contains_over_filter_count
  - redundant_nil_coalescing
  - toggle_bool

included:
  - Sources
  - Tests

excluded:
  - .build
  - .swiftpm

function_body_length:
  warning: 60
  error: 120

type_body_length:
  warning: 300
  error: 500

cyclomatic_complexity:
  warning: 10
  error: 20
