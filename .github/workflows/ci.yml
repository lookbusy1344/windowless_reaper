name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-test:
    name: Build, Lint & Test
    runs-on: macos-15

    steps:
      - uses: actions/checkout@v4

      # The stock runner Xcode only ships Swift 6.2; we build against the
      # latest Swift toolchain (see CLAUDE.md). Xcode is still selected to
      # supply the macOS SDK that the swift.org toolchain borrows.
      - name: Select Xcode (provides the macOS SDK)
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: 'latest-stable'

      - name: Install latest Swift toolchain via swiftly
        run: |
          curl -fsSL -O https://download.swift.org/swiftly/darwin/swiftly.pkg
          installer -pkg swiftly.pkg -target CurrentUserHomeDirectory
          echo "${HOME}/.swiftly/bin" >> "$GITHUB_PATH"
          "${HOME}/.swiftly/bin/swiftly" init --quiet-shell-followup --assume-yes --skip-install
          "${HOME}/.swiftly/bin/swiftly" install latest --use --assume-yes
          swift --version

      - name: Cache Swift build artifacts
        uses: actions/cache@v4
        with:
          path: .build
          key: ${{ runner.os }}-swift-${{ hashFiles('Package.resolved') }}
          restore-keys: |
            ${{ runner.os }}-swift-

      - name: Install tools
        run: brew install swiftlint swiftformat periphery coreutils
        env:
          HOMEBREW_NO_AUTO_UPDATE: "1"
          HOMEBREW_NO_INSTALLED_DEPENDENTS_CHECK: "1"

      - name: SwiftFormat lint
        run: swiftformat --lint .

      - name: SwiftLint
        run: swiftlint --strict

      - name: Build & test (with index store for Periphery)
        run: gtimeout 60 swift test --parallel -Xswiftc -index-store-path -Xswiftc .build/index/store

      - name: Periphery dead-code scan
        run: periphery scan --strict
